<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDesk — Team Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --surface3: #2a2a36;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --text-muted: #888899;
    --text-dim: #555566;
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.25);
    --todo: #3d8bff;
    --todo-bg: rgba(61,139,255,0.08);
    --inprogress: #f59e0b;
    --inprogress-bg: rgba(245,158,11,0.08);
    --waiting: #a78bfa;
    --waiting-bg: rgba(167,139,250,0.08);
    --done: #34d399;
    --done-bg: rgba(52,211,153,0.08);
    --high: #f87171;
    --medium: #fbbf24;
    --low: #6ee7b7;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .header-controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; stroke: var(--text-muted); fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
  }
  input[type="text"].search-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 8px 12px 8px 32px; width: 200px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="text"].search-input:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }

  select.filter-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 8px 12px; outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  select.filter-select:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all .2s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .btn-primary:hover { background: #6b58f0; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--surface3); }
  .btn-ghost {
    background: transparent; color: var(--text-muted); border: none;
    padding: 6px 10px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }

  /* ── MAIN LAYOUT ─────────────────────────── */
  main { padding: 24px 28px; }

  .board-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .board-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px;
  }
  .board-meta { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

  /* ── KANBAN BOARD ─────────────────────────── */
  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-items: start;
    min-height: 70vh;
  }

  .column {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .column-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .column-label {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .col-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .col-count {
    background: var(--surface3); color: var(--text-muted);
    font-size: 12px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px; font-family: 'DM Sans', sans-serif;
  }

  .column[data-col="todo"] .col-dot { background: var(--todo); }
  .column[data-col="inprogress"] .col-dot { background: var(--inprogress); }
  .column[data-col="waiting"] .col-dot { background: var(--waiting); }
  .column[data-col="done"] .col-dot { background: var(--done); }

  .column[data-col="todo"] { border-top: 3px solid var(--todo); }
  .column[data-col="inprogress"] { border-top: 3px solid var(--inprogress); }
  .column[data-col="waiting"] { border-top: 3px solid var(--waiting); }
  .column[data-col="done"] { border-top: 3px solid var(--done); }

  .column-body {
    padding: 12px;
    min-height: 120px;
    display: flex; flex-direction: column; gap: 10px;
    transition: background .2s;
  }
  .column-body.drag-over {
    background: rgba(124,106,247,0.05);
  }

  .add-task-col {
    margin: 8px 12px 12px;
    padding: 8px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 13px; cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .add-task-col:hover {
    color: var(--text-muted); border-color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── TASK CARDS ─────────────────────────── */
  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    cursor: grab;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .task-card[data-priority="High"]::before { background: var(--high); }
  .task-card[data-priority="Medium"]::before { background: var(--medium); }
  .task-card[data-priority="Low"]::before { background: var(--low); }

  .task-card:hover {
    border-color: rgba(124,106,247,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .task-card.dragging {
    opacity: 0.4; cursor: grabbing;
  }
  .task-card.hidden { display: none; }

  .task-card-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 8px;
  }
  .task-title {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px;
    line-height: 1.3; flex: 1;
  }
  .task-actions {
    display: flex; gap: 2px; margin-left: 8px; flex-shrink: 0;
  }
  .task-action-btn {
    width: 24px; height: 24px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px;
    cursor: pointer; transition: background .2s;
    color: var(--text-muted);
  }
  .task-action-btn:hover { background: var(--surface3); color: var(--text); }
  .task-action-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .task-desc {
    color: var(--text-muted); font-size: 12px; margin-bottom: 10px;
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-meta {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 6px;
  }

  .priority-badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .priority-badge.High { background: rgba(248,113,113,0.15); color: var(--high); }
  .priority-badge.Medium { background: rgba(251,191,36,0.15); color: var(--medium); }
  .priority-badge.Low { background: rgba(110,231,183,0.15); color: var(--low); }

  .due-date {
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .due-date svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .due-date.overdue { color: var(--high); }

  .task-footer {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .assignee {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
  }
  .avatar {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  .comment-count {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-dim);
  }
  .comment-count svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── MODAL ─────────────────────────────── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    padding: 16px;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px);
    transition: transform .25s;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .modal-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px;
  }

  .modal-body { padding: 24px; }

  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 12px; outline: none; width: 100%;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
  }

  /* ── TASK DETAIL MODAL ─────────────────── */
  .detail-modal { max-width: 640px; }

  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--text-muted); margin-bottom: 10px;
  }

  .comment-list { display: flex; flex-direction: column; gap: 10px; }
  .comment-item {
    background: var(--surface2); border-radius: var(--radius-sm);
    padding: 10px 12px; font-size: 13px;
  }
  .comment-item-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .comment-author { font-weight: 500; font-size: 12px; }
  .comment-time { color: var(--text-dim); font-size: 11px; }
  .comment-text { color: var(--text-muted); line-height: 1.5; }

  .comment-input-wrap {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .comment-input-wrap input {
    flex: 1; padding: 8px 12px; font-size: 13px;
  }

  /* ── TEAM PANEL ─────────────────────────── */
  .side-panel-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
    z-index: 150; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .side-panel-overlay.open { opacity: 1; pointer-events: all; }

  .side-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 360px; background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 151;
    transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .side-panel-overlay.open .side-panel { transform: translateX(0); }

  .side-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .side-panel-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
  }

  .side-panel-body { padding: 20px; flex: 1; overflow-y: auto; }

  .member-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .member-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
  }
  .member-info { flex: 1; }
  .member-name { font-weight: 500; font-size: 14px; }
  .member-role { font-size: 12px; color: var(--text-muted); }
  .member-delete {
    color: var(--text-dim); cursor: pointer; padding: 4px;
    border-radius: 6px; transition: all .2s;
  }
  .member-delete:hover { color: var(--high); background: rgba(248,113,113,0.1); }
  .member-delete svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .add-member-form { display: flex; flex-direction: column; gap: 10px; }
  .add-member-form h3 {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    margin-bottom: 2px;
  }

  /* ── ACTIVITY LOG ─────────────────────────── */
  .activity-panel { max-width: 480px; }
  .activity-list { display: flex; flex-direction: column; gap: 2px; }
  .activity-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    margin-top: 2px;
  }
  .activity-text { font-size: 13px; line-height: 1.5; color: var(--text-muted); }
  .activity-text strong { color: var(--text); font-weight: 500; }
  .activity-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── NOTIFICATION ─────────────────────────── */
  .notif-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 300;
  }
  .notif {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm); padding: 12px 16px;
    min-width: 260px; max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex; align-items: flex-start; gap: 10px;
    animation: slideIn .3s ease;
  }
  .notif.success { border-left-color: var(--done); }
  .notif.warning { border-left-color: var(--inprogress); }
  .notif-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .notif-body { flex: 1; }
  .notif-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .notif-msg { font-size: 12px; color: var(--text-muted); }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── EMPTY STATE ─────────────────────────── */
  .empty-col {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 12px; color: var(--text-dim); font-size: 12px;
    gap: 6px;
  }
  .empty-col svg { width: 28px; height: 28px; opacity: 0.3; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── SCROLLBAR ─────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* ── RESPONSIVE ─────────────────────────── */
  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(2, 1fr); }
    main { padding: 16px; }
  }
  @media (max-width: 600px) {
    .board { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; gap: 10px; }
    .header-controls { width: 100%; }
    input[type="text"].search-input { width: 100%; }
    .form-grid { grid-template-columns: 1fr; }
    .side-panel { width: 100%; }
  }

  /* ── MISC ─────────────────────────── */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .status-tag {
    font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .status-todo { background: rgba(61,139,255,0.12); color: var(--todo); }
  .status-inprogress { background: rgba(245,158,11,0.12); color: var(--inprogress); }
  .status-waiting { background: rgba(167,139,250,0.12); color: var(--waiting); }
  .status-done { background: rgba(52,211,153,0.12); color: var(--done); }

  .close-btn {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; background: var(--surface2); color: var(--text-muted);
    border: 1px solid var(--border); transition: all .2s;
  }
  .close-btn:hover { color: var(--text); background: var(--surface3); }
  .close-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── BULK TABLE ─────────────────────────── */
  .bulk-table-wrap {
    overflow-x: auto; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .bulk-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .bulk-table thead th {
    background: var(--surface3); padding: 9px 10px;
    text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .bulk-table tbody tr { border-bottom: 1px solid var(--border); }
  .bulk-table tbody tr:last-child { border-bottom: none; }
  .bulk-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .bulk-table td { padding: 7px 6px; vertical-align: middle; }
  .bulk-table td input,
  .bulk-table td select {
    background: transparent; border: 1px solid transparent;
    padding: 5px 8px; font-size: 13px; border-radius: 6px;
    width: 100%; color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .bulk-table td input:focus,
  .bulk-table td select:focus {
    border-color: var(--accent); background: var(--surface2);
    box-shadow: 0 0 0 2px var(--accent-glow); outline: none;
  }
  .bulk-table td input:hover,
  .bulk-table td select:hover {
    border-color: var(--border); background: var(--surface2);
  }
  .bulk-row-num {
    color: var(--text-dim); font-size: 11px; font-weight: 600;
    text-align: center; padding: 0 4px;
  }
  .bulk-del-btn {
    width: 26px; height: 26px; display: flex; align-items: center;
    justify-content: center; border-radius: 6px; cursor: pointer;
    color: var(--text-dim); transition: all .2s; margin: 0 auto;
  }
  .bulk-del-btn:hover { color: var(--high); background: rgba(248,113,113,0.1); }
  .bulk-del-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .bulk-table td select option { background: var(--surface2); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    FlowDesk
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search tasks…">
    </div>
    <select class="filter-select" id="filterMember">
      <option value="">All members</option>
    </select>
    <select class="filter-select" id="filterPriority">
      <option value="">All priorities</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
    <select class="filter-select" id="filterDue">
      <option value="">All due dates</option>
      <option value="overdue">⚠ Overdue</option>
      <option value="today">📅 Due Today</option>
      <option value="tomorrow">Due Tomorrow</option>
      <option value="week">Due This Week</option>
      <option value="nodate">No Due Date</option>
    </select>
    <button class="btn btn-secondary" onclick="openTeamPanel()">
      <svg style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Team
    </button>
    <button class="btn btn-secondary" onclick="openActivityPanel()">
      <svg style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Activity
    </button>
    <button class="btn btn-secondary" onclick="openBulkModal()">
      <svg style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Bulk Add
    </button>
    <button class="btn btn-primary" onclick="openTaskModal()">
      <svg style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New Task
    </button>
  </div>
</header>

<!-- MAIN BOARD -->
<main>
  <div class="board-header">
    <div>
      <div class="board-title">Support Team Board</div>
      <div class="board-meta" id="boardMeta"></div>
    </div>
  </div>

  <div class="board" id="board">
    <!-- Columns rendered by JS -->
  </div>
</main>

<!-- TASK MODAL -->
<div class="overlay" id="taskOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="taskModalTitle">New Task</div>
      <div class="close-btn" onclick="closeTaskModal()">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Task Title *</label>
          <input type="text" id="taskTitle" placeholder="Enter task title…">
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="taskDesc" placeholder="Describe the task…"></textarea>
        </div>
        <div class="form-group">
          <label>Assigned To</label>
          <select id="taskAssignee">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority">
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="taskDue">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="taskStatus">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="waiting">Waiting for Update</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal detail-modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" id="detailEditBtn" onclick="editFromDetail()" style="padding:6px 12px;font-size:12px">Edit</button>
        <div class="close-btn" onclick="closeDetailModal()">
          <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>
      </div>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- TEAM SIDE PANEL -->
<div class="side-panel-overlay" id="teamPanelOverlay" onclick="closeTeamPanel()">
  <div class="side-panel" onclick="event.stopPropagation()">
    <div class="side-panel-header">
      <div class="side-panel-title">Team Members</div>
      <div class="close-btn" onclick="closeTeamPanel()">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="side-panel-body">
      <div class="member-list" id="memberList"></div>
      <div class="divider"></div>
      <div class="add-member-form">
        <h3>Add Member</h3>
        <input type="text" id="newMemberName" placeholder="Full name…">
        <input type="text" id="newMemberRole" placeholder="Role (e.g. Support Agent)…">
        <button class="btn btn-primary" onclick="addMember()">Add Member</button>
      </div>
    </div>
  </div>
</div>

<!-- ACTIVITY SIDE PANEL -->
<div class="side-panel-overlay" id="activityPanelOverlay" onclick="closeActivityPanel()">
  <div class="side-panel" onclick="event.stopPropagation()">
    <div class="side-panel-header">
      <div class="side-panel-title">Activity Log</div>
      <div class="close-btn" onclick="closeActivityPanel()">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="side-panel-body">
      <div class="activity-list" id="activityList"></div>
    </div>
  </div>
</div>

<!-- BULK TASK MODAL -->
<div class="overlay" id="bulkOverlay">
  <div class="modal" style="max-width:820px;">
    <div class="modal-header">
      <div>
        <div class="modal-title">Bulk Add Tasks</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px">Add multiple tasks at once. Each row is one task.</div>
      </div>
      <div class="close-btn" onclick="closeBulkModal()">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div class="modal-body" style="padding:16px 20px;">
      <div class="bulk-table-wrap">
        <table class="bulk-table" id="bulkTable">
          <thead>
            <tr>
              <th style="width:26px"></th>
              <th>Title <span style="color:var(--high)">*</span></th>
              <th>Description</th>
              <th style="width:130px">Assignee</th>
              <th style="width:100px">Priority</th>
              <th style="width:120px">Due Date</th>
              <th style="width:130px">Status</th>
              <th style="width:32px"></th>
            </tr>
          </thead>
          <tbody id="bulkBody"></tbody>
        </table>
      </div>
      <button class="btn btn-secondary" onclick="addBulkRow()" style="margin-top:12px;font-size:12px;padding:6px 14px;">
        <svg style="width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Row
      </button>
    </div>
    <div class="modal-footer" style="justify-content:space-between;">
      <div style="font-size:12px;color:var(--text-muted)" id="bulkRowCount"></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" onclick="closeBulkModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBulkTasks()">
          <svg style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Save All Tasks
        </button>
      </div>
    </div>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div class="notif-container" id="notifContainer"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
const COLORS = ['#7c6af7','#3d8bff','#f59e0b','#34d399','#f87171','#a78bfa','#fb923c','#38bdf8'];

let state = JSON.parse(localStorage.getItem('flowdesk_state') || 'null') || {
  tasks: [],
  members: [
    { id: 'm1', name: 'Alex Rivera', role: 'Team Lead', color: COLORS[0] },
    { id: 'm2', name: 'Sam Chen', role: 'Support Agent', color: COLORS[1] },
    { id: 'm3', name: 'Jordan Lee', role: 'Support Agent', color: COLORS[2] },
  ],
  activity: [],
  nextId: 1
};

const COLS = [
  { id: 'todo', label: 'To Do' },
  { id: 'inprogress', label: 'In Progress' },
  { id: 'waiting', label: 'Waiting for Update' },
  { id: 'done', label: 'Done' },
];

const statusLabel = { todo: 'To Do', inprogress: 'In Progress', waiting: 'Waiting', done: 'Done' };

let editingTaskId = null;
let detailTaskId = null;
let dragTaskId = null;

function save() { localStorage.setItem('flowdesk_state', JSON.stringify(state)); }

// ── ACTIVITY ───────────────────────────────────────────────
function logActivity(msg, icon = '✦') {
  state.activity.unshift({ msg, icon, time: new Date().toISOString() });
  if (state.activity.length > 50) state.activity = state.activity.slice(0, 50);
  save();
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// ── NOTIFICATIONS ───────────────────────────────────────────
function showNotif(title, msg, type = '') {
  const icons = { success: '✓', warning: '⚠', '': '✦' };
  const el = document.createElement('div');
  el.className = 'notif ' + type;
  el.innerHTML = `<div class="notif-icon">${icons[type] || '✦'}</div><div class="notif-body"><div class="notif-title">${title}</div><div class="notif-msg">${msg}</div></div>`;
  document.getElementById('notifContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = '.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ── RENDER ─────────────────────────────────────────────────
function getMember(id) { return state.members.find(m => m.id === id); }
function initials(name) { return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }

function getFilters() {
  return {
    search: document.getElementById('searchInput').value.toLowerCase().trim(),
    member: document.getElementById('filterMember').value,
    priority: document.getElementById('filterPriority').value,
    due: document.getElementById('filterDue').value,
  };
}

function taskVisible(task, filters) {
  if (filters.search && !task.title.toLowerCase().includes(filters.search) && !(task.desc||'').toLowerCase().includes(filters.search)) return false;
  if (filters.member && task.assignee !== filters.member) return false;
  if (filters.priority && task.priority !== filters.priority) return false;
  if (filters.due) {
    const today = new Date(new Date().toDateString());
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    const weekEnd = new Date(today); weekEnd.setDate(today.getDate()+7);
    if (filters.due === 'nodate') { if (task.due) return false; }
    else if (!task.due) return false;
    else {
      const d = new Date(task.due);
      if (filters.due === 'overdue' && !(d < today && task.status !== 'done')) return false;
      if (filters.due === 'today' && !(d.getTime() === today.getTime())) return false;
      if (filters.due === 'tomorrow' && !(d.getTime() === tomorrow.getTime())) return false;
      if (filters.due === 'week' && !(d >= today && d <= weekEnd)) return false;
    }
  }
  return true;
}

function isOverdue(due) {
  if (!due) return false;
  return new Date(due) < new Date(new Date().toDateString());
}

function renderCard(task) {
  const m = getMember(task.assignee);
  const overdue = isOverdue(task.due) && task.status !== 'done';
  const comments = task.comments || [];
  return `
  <div class="task-card" data-id="${task.id}" data-priority="${task.priority}"
    draggable="true"
    ondragstart="onDragStart(event,'${task.id}')"
    ondragend="onDragEnd(event)">
    <div class="task-card-top">
      <div class="task-title">${esc(task.title)}</div>
      <div class="task-actions">
        <div class="task-action-btn" onclick="openDetailModal('${task.id}')">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="task-action-btn" onclick="deleteTask('${task.id}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </div>
      </div>
    </div>
    ${task.desc ? `<div class="task-desc">${esc(task.desc)}</div>` : ''}
    <div class="task-meta">
      <span class="priority-badge ${task.priority}">${task.priority}</span>
      ${task.due ? `<div class="due-date ${overdue?'overdue':''}"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatDate(task.due)}</div>` : ''}
    </div>
    <div class="task-footer">
      <div class="assignee">
        ${m ? `<div class="avatar" style="background:${m.color}">${initials(m.name)}</div>${esc(m.name)}` : '<span style="color:var(--text-dim);font-size:12px">Unassigned</span>'}
      </div>
      ${comments.length ? `<div class="comment-count"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${comments.length}</div>` : ''}
    </div>
  </div>`;
}

function renderBoard() {
  const filters = getFilters();
  const board = document.getElementById('board');
  board.innerHTML = '';
  let total = 0;

  COLS.forEach(col => {
    const tasks = state.tasks.filter(t => t.status === col.id);
    const visibleTasks = tasks.filter(t => taskVisible(t, filters));
    total += tasks.length;

    const colEl = document.createElement('div');
    colEl.className = 'column'; colEl.dataset.col = col.id;
    colEl.innerHTML = `
      <div class="column-header">
        <div class="column-label"><div class="col-dot"></div>${col.label}</div>
        <span class="col-count">${tasks.length}</span>
      </div>
      <div class="column-body" id="col_${col.id}"
        ondragover="onDragOver(event)"
        ondrop="onDrop(event,'${col.id}')"
        ondragleave="onDragLeave(event)">
        ${visibleTasks.length === 0 ? `<div class="empty-col"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>No tasks</div>` : ''}
        ${visibleTasks.map(renderCard).join('')}
      </div>
      <div class="add-task-col" onclick="openTaskModal('${col.id}')">+ Add task</div>
    `;
    board.appendChild(colEl);
  });

  document.getElementById('boardMeta').textContent = `${total} task${total!==1?'s':''} · ${state.members.length} members`;
  updateMemberDropdowns();
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── MEMBER DROPDOWNS ────────────────────────────────────────
function updateMemberDropdowns() {
  const opts = '<option value="">Unassigned</option>' + state.members.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  document.getElementById('taskAssignee').innerHTML = opts;

  const filterOpts = '<option value="">All members</option>' + state.members.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  document.getElementById('filterMember').innerHTML = filterOpts;
}

// ── TASK MODAL ──────────────────────────────────────────────
function openTaskModal(defaultStatus) {
  editingTaskId = null;
  document.getElementById('taskModalTitle').textContent = 'New Task';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskAssignee').value = '';
  document.getElementById('taskPriority').value = 'Medium';
  document.getElementById('taskDue').value = '';
  document.getElementById('taskStatus').value = defaultStatus || 'todo';
  updateMemberDropdowns();
  document.getElementById('taskOverlay').classList.add('open');
  setTimeout(() => document.getElementById('taskTitle').focus(), 300);
}

function closeTaskModal() { document.getElementById('taskOverlay').classList.remove('open'); }

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { showNotif('Missing title', 'Please enter a task title.', 'warning'); return; }

  const assigneeId = document.getElementById('taskAssignee').value;
  const isNew = !editingTaskId;

  const taskData = {
    title,
    desc: document.getElementById('taskDesc').value.trim(),
    assignee: assigneeId,
    priority: document.getElementById('taskPriority').value,
    due: document.getElementById('taskDue').value,
    status: document.getElementById('taskStatus').value,
  };

  if (editingTaskId) {
    const idx = state.tasks.findIndex(t => t.id === editingTaskId);
    if (idx !== -1) {
      const old = state.tasks[idx];
      state.tasks[idx] = { ...old, ...taskData };
      logActivity(`Updated task <strong>${esc(title)}</strong>`, '✏');
      showNotif('Task updated', title, 'success');
    }
  } else {
    const task = { id: 't' + (state.nextId++), ...taskData, comments: [], createdAt: new Date().toISOString() };
    state.tasks.push(task);
    logActivity(`Created task <strong>${esc(title)}</strong>`, '✦');
    if (assigneeId) {
      const m = getMember(assigneeId);
      if (m) {
        showNotif('Task assigned', `"${title}" assigned to ${m.name}`, 'success');
        logActivity(`Assigned <strong>${esc(title)}</strong> to <strong>${esc(m.name)}</strong>`, '👤');
      }
    } else {
      showNotif('Task created', title, 'success');
    }
  }

  save();
  closeTaskModal();
  renderBoard();
}

// ── DELETE ──────────────────────────────────────────────────
function deleteTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`Delete "${task.title}"?`)) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  logActivity(`Deleted task <strong>${esc(task.title)}</strong>`, '🗑');
  save(); renderBoard();
  showNotif('Task deleted', task.title);
}

// ── DETAIL MODAL ─────────────────────────────────────────────
function openDetailModal(id) {
  detailTaskId = id;
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  const m = getMember(task.assignee);

  document.getElementById('detailTitle').textContent = task.title;
  document.getElementById('detailOverlay').classList.add('open');

  const statusMap = { todo: 'status-todo', inprogress: 'status-inprogress', waiting: 'status-waiting', done: 'status-done' };
  const comments = task.comments || [];

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        <span class="status-tag ${statusMap[task.status]}">${statusLabel[task.status]}</span>
        <span class="priority-badge ${task.priority}">${task.priority}</span>
        ${task.due ? `<div class="due-date ${isOverdue(task.due)&&task.status!=='done'?'overdue':''}"><svg style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Due ${formatDate(task.due)}</div>` : ''}
      </div>
      ${task.desc ? `<div style="color:var(--text-muted);font-size:14px;line-height:1.6">${esc(task.desc)}</div>` : ''}
    </div>
    ${m ? `<div class="detail-section">
      <div class="detail-section-title">Assigned To</div>
      <div class="assignee"><div class="avatar" style="background:${m.color};width:30px;height:30px;font-size:12px">${initials(m.name)}</div><div><div style="font-size:14px;font-weight:500">${esc(m.name)}</div><div style="font-size:12px;color:var(--text-muted)">${esc(m.role)}</div></div></div>
    </div>` : ''}
    <div class="detail-section">
      <div class="detail-section-title">Comments (${comments.length})</div>
      <div class="comment-list" id="commentList">
        ${comments.map(c => `
          <div class="comment-item">
            <div class="comment-item-head">
              <div class="avatar" style="background:${c.color||'#555'};width:22px;height:22px;font-size:10px">${esc(c.authorInitials||'?')}</div>
              <span class="comment-author">${esc(c.author)}</span>
              <span class="comment-time">${timeAgo(c.time)}</span>
            </div>
            <div class="comment-text">${esc(c.text)}</div>
          </div>
        `).join('')}
      </div>
      <div class="comment-input-wrap">
        <input type="text" id="commentInput" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment()">
        <button class="btn btn-primary" onclick="addComment()" style="padding:8px 14px;font-size:13px">Post</button>
      </div>
    </div>
  `;
}

function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('open'); detailTaskId = null; }

function editFromDetail() {
  closeDetailModal();
  const task = state.tasks.find(t => t.id === detailTaskId || t.id === state.tasks[0]?.id);
  const id = detailTaskId;
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  editingTaskId = id;
  updateMemberDropdowns();
  document.getElementById('taskModalTitle').textContent = 'Edit Task';
  document.getElementById('taskTitle').value = t.title;
  document.getElementById('taskDesc').value = t.desc;
  document.getElementById('taskAssignee').value = t.assignee || '';
  document.getElementById('taskPriority').value = t.priority;
  document.getElementById('taskDue').value = t.due || '';
  document.getElementById('taskStatus').value = t.status;
  document.getElementById('taskOverlay').classList.add('open');
}

// fix edit from detail
function openDetailModal(id) {
  detailTaskId = id;
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  const m = getMember(task.assignee);
  document.getElementById('detailTitle').textContent = task.title;
  document.getElementById('detailEditBtn').onclick = () => {
    closeDetailModal();
    editTask(id);
  };
  document.getElementById('detailOverlay').classList.add('open');
  const statusMap = { todo: 'status-todo', inprogress: 'status-inprogress', waiting: 'status-waiting', done: 'status-done' };
  const comments = task.comments || [];
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        <span class="status-tag ${statusMap[task.status]}">${statusLabel[task.status]}</span>
        <span class="priority-badge ${task.priority}">${task.priority}</span>
        ${task.due ? `<div class="due-date ${isOverdue(task.due)&&task.status!=='done'?'overdue':''}"><svg style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Due ${formatDate(task.due)}</div>` : ''}
      </div>
      ${task.desc ? `<div style="color:var(--text-muted);font-size:14px;line-height:1.6">${esc(task.desc)}</div>` : ''}
    </div>
    ${m ? `<div class="detail-section">
      <div class="detail-section-title">Assigned To</div>
      <div class="assignee"><div class="avatar" style="background:${m.color};width:30px;height:30px;font-size:12px">${initials(m.name)}</div><div><div style="font-size:14px;font-weight:500">${esc(m.name)}</div><div style="font-size:12px;color:var(--text-muted)">${esc(m.role)}</div></div></div>
    </div>` : ''}
    <div class="detail-section">
      <div class="detail-section-title">Comments (${comments.length})</div>
      <div class="comment-list" id="commentList">
        ${comments.map(c => `<div class="comment-item"><div class="comment-item-head"><div class="avatar" style="background:${c.color||'#555'};width:22px;height:22px;font-size:10px">${esc(c.authorInitials||'?')}</div><span class="comment-author">${esc(c.author)}</span><span class="comment-time">${timeAgo(c.time)}</span></div><div class="comment-text">${esc(c.text)}</div></div>`).join('')}
      </div>
      <div class="comment-input-wrap">
        <input type="text" id="commentInput" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment()">
        <button class="btn btn-primary" onclick="addComment()" style="padding:8px 14px;font-size:13px">Post</button>
      </div>
    </div>
  `;
}

function editTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  editingTaskId = id;
  updateMemberDropdowns();
  document.getElementById('taskModalTitle').textContent = 'Edit Task';
  document.getElementById('taskTitle').value = t.title;
  document.getElementById('taskDesc').value = t.desc;
  document.getElementById('taskAssignee').value = t.assignee || '';
  document.getElementById('taskPriority').value = t.priority;
  document.getElementById('taskDue').value = t.due || '';
  document.getElementById('taskStatus').value = t.status;
  document.getElementById('taskOverlay').classList.add('open');
}

function addComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  const task = state.tasks.find(t => t.id === detailTaskId);
  if (!task) return;
  if (!task.comments) task.comments = [];
  task.comments.push({ text, author: 'You', authorInitials: 'YO', color: '#7c6af7', time: new Date().toISOString() });
  logActivity(`Commented on <strong>${esc(task.title)}</strong>`, '💬');
  save();
  renderBoard();
  openDetailModal(detailTaskId);
  document.getElementById('commentInput').value = '';
}

// ── TEAM PANEL ──────────────────────────────────────────────
function openTeamPanel() { document.getElementById('teamPanelOverlay').classList.add('open'); renderMemberList(); }
function closeTeamPanel() { document.getElementById('teamPanelOverlay').classList.remove('open'); }

function renderMemberList() {
  document.getElementById('memberList').innerHTML = state.members.map(m => `
    <div class="member-item">
      <div class="avatar" style="background:${m.color};width:36px;height:36px;font-size:13px">${initials(m.name)}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-role">${esc(m.role)}</div>
      </div>
      <div class="member-delete" onclick="deleteMember('${m.id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
    </div>
  `).join('');
}

function addMember() {
  const name = document.getElementById('newMemberName').value.trim();
  const role = document.getElementById('newMemberRole').value.trim();
  if (!name) { showNotif('Missing name', 'Enter a member name.', 'warning'); return; }
  const color = COLORS[state.members.length % COLORS.length];
  state.members.push({ id: 'm' + Date.now(), name, role: role || 'Team Member', color });
  logActivity(`Added team member <strong>${esc(name)}</strong>`, '👤');
  save();
  document.getElementById('newMemberName').value = '';
  document.getElementById('newMemberRole').value = '';
  renderMemberList();
  updateMemberDropdowns();
  showNotif('Member added', name, 'success');
}

function deleteMember(id) {
  const m = state.members.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`Remove ${m.name}?`)) return;
  state.members = state.members.filter(x => x.id !== id);
  logActivity(`Removed team member <strong>${esc(m.name)}</strong>`, '👤');
  save();
  renderMemberList();
  updateMemberDropdowns();
  renderBoard();
}

// ── ACTIVITY PANEL ──────────────────────────────────────────
function openActivityPanel() {
  document.getElementById('activityPanelOverlay').classList.add('open');
  document.getElementById('activityList').innerHTML = state.activity.length === 0
    ? '<div style="color:var(--text-dim);font-size:13px;padding:16px 0">No activity yet.</div>'
    : state.activity.map(a => `
      <div class="activity-item">
        <div class="activity-icon">${a.icon}</div>
        <div>
          <div class="activity-text">${a.msg}</div>
          <div class="activity-time">${timeAgo(a.time)}</div>
        </div>
      </div>
    `).join('');
}
function closeActivityPanel() { document.getElementById('activityPanelOverlay').classList.remove('open'); }

// ── DRAG & DROP ─────────────────────────────────────────────
function onDragStart(e, id) {
  dragTaskId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  dragTaskId = null;
  document.querySelectorAll('.column-body').forEach(c => c.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragTaskId) return;
  const task = state.tasks.find(t => t.id === dragTaskId);
  if (!task || task.status === colId) return;
  const oldStatus = task.status;
  task.status = colId;
  logActivity(`Moved <strong>${esc(task.title)}</strong> to <strong>${statusLabel[colId]}</strong>`, '→');
  save(); renderBoard();
  showNotif('Task moved', `"${task.title}" → ${statusLabel[colId]}`, 'success');
}

// ── FILTERS ─────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderBoard);
document.getElementById('filterMember').addEventListener('change', renderBoard);
document.getElementById('filterPriority').addEventListener('change', renderBoard);
document.getElementById('filterDue').addEventListener('change', renderBoard);

// ── CLOSE MODAL ON BACKDROP ─────────────────────────────────
document.getElementById('taskOverlay').addEventListener('click', function(e) { if(e.target === this) closeTaskModal(); });
document.getElementById('detailOverlay').addEventListener('click', function(e) { if(e.target === this) closeDetailModal(); });

// ── SEED DATA ────────────────────────────────────────────────
if (state.tasks.length === 0) {
  const today = new Date();
  const d = (offset) => { const x = new Date(today); x.setDate(x.getDate()+offset); return x.toISOString().slice(0,10); };
  state.tasks = [
    { id:'t1', title:'Respond to billing complaints', desc:'Handle the backlog of billing-related tickets from the last 48 hours.', assignee:'m2', priority:'High', due:d(-1), status:'todo', comments:[], createdAt:new Date().toISOString() },
    { id:'t2', title:'Update FAQ documentation', desc:'Revise the FAQ page with answers to the 10 most common questions this month.', assignee:'m1', priority:'Medium', due:d(3), status:'inprogress', comments:[{text:'Draft is ready, reviewing now.', author:'Alex Rivera', authorInitials:'AR', color:COLORS[0], time:new Date().toISOString()}], createdAt:new Date().toISOString() },
    { id:'t3', title:'Escalate refund request #4821', desc:'Customer requested a full refund. Needs manager approval.', assignee:'m3', priority:'High', due:d(1), status:'waiting', comments:[], createdAt:new Date().toISOString() },
    { id:'t4', title:'Weekly team sync notes', desc:'Compile and share notes from the Monday team meeting.', assignee:'m1', priority:'Low', due:d(-2), status:'done', comments:[], createdAt:new Date().toISOString() },
    { id:'t5', title:'Set up live chat widget', desc:'Integrate the new live chat tool on the support portal homepage.', assignee:'m2', priority:'Medium', due:d(5), status:'todo', comments:[], createdAt:new Date().toISOString() },
    { id:'t6', title:'Train new agent onboarding', desc:'Prepare onboarding checklist and schedule for the two new support hires.', assignee:'m1', priority:'Medium', due:d(7), status:'inprogress', comments:[], createdAt:new Date().toISOString() },
  ];
  state.nextId = 7;
  save();
}

// ── BULK ADD ─────────────────────────────────────────────────
let bulkRowCounter = 0;

function memberOptions() {
  return '<option value="">Unassigned</option>' + state.members.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
}

function addBulkRow(defaults = {}) {
  bulkRowCounter++;
  const id = 'br_' + bulkRowCounter;
  const tbody = document.getElementById('bulkBody');
  const tr = document.createElement('tr');
  tr.id = id;
  tr.innerHTML = `
    <td class="bulk-row-num">${tbody.children.length + 1}</td>
    <td><input type="text" placeholder="Task title…" class="bulk-title" value="${esc(defaults.title||'')}"></td>
    <td><input type="text" placeholder="Description…" class="bulk-desc" value="${esc(defaults.desc||'')}"></td>
    <td><select class="bulk-assignee">${memberOptions()}</select></td>
    <td>
      <select class="bulk-priority">
        <option value="Medium" ${(defaults.priority||'Medium')==='Medium'?'selected':''}>Medium</option>
        <option value="High" ${defaults.priority==='High'?'selected':''}>High</option>
        <option value="Low" ${defaults.priority==='Low'?'selected':''}>Low</option>
      </select>
    </td>
    <td><input type="date" class="bulk-due" value="${defaults.due||''}"></td>
    <td>
      <select class="bulk-status">
        <option value="todo" ${(defaults.status||'todo')==='todo'?'selected':''}>To Do</option>
        <option value="inprogress" ${defaults.status==='inprogress'?'selected':''}>In Progress</option>
        <option value="waiting" ${defaults.status==='waiting'?'selected':''}>Waiting</option>
        <option value="done" ${defaults.status==='done'?'selected':''}>Done</option>
      </select>
    </td>
    <td>
      <div class="bulk-del-btn" onclick="removeBulkRow('${id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
    </td>
  `;
  tbody.appendChild(tr);
  if (defaults.assignee) tr.querySelector('.bulk-assignee').value = defaults.assignee;
  updateBulkRowNums();
  updateBulkCount();
}

function removeBulkRow(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  updateBulkRowNums();
  updateBulkCount();
}

function updateBulkRowNums() {
  document.querySelectorAll('#bulkBody tr').forEach((tr, i) => {
    const numCell = tr.querySelector('.bulk-row-num');
    if (numCell) numCell.textContent = i + 1;
  });
}

function updateBulkCount() {
  const rows = document.querySelectorAll('#bulkBody tr').length;
  document.getElementById('bulkRowCount').textContent = rows === 0 ? 'No rows yet' : `${rows} task${rows!==1?'s':''} ready to add`;
}

function openBulkModal() {
  document.getElementById('bulkBody').innerHTML = '';
  bulkRowCounter = 0;
  // Start with 3 empty rows
  addBulkRow(); addBulkRow(); addBulkRow();
  document.getElementById('bulkOverlay').classList.add('open');
  // Re-render member options in case they changed
  document.querySelectorAll('.bulk-assignee').forEach(sel => { sel.innerHTML = memberOptions(); });
}

function closeBulkModal() { document.getElementById('bulkOverlay').classList.remove('open'); }

function saveBulkTasks() {
  const rows = document.querySelectorAll('#bulkBody tr');
  const toAdd = [];
  let hasError = false;

  rows.forEach((tr, i) => {
    const title = tr.querySelector('.bulk-title').value.trim();
    if (!title) { hasError = true; tr.querySelector('.bulk-title').style.borderColor = 'var(--high)'; return; }
    tr.querySelector('.bulk-title').style.borderColor = '';
    toAdd.push({
      id: 't' + (state.nextId++),
      title,
      desc: tr.querySelector('.bulk-desc').value.trim(),
      assignee: tr.querySelector('.bulk-assignee').value,
      priority: tr.querySelector('.bulk-priority').value,
      due: tr.querySelector('.bulk-due').value,
      status: tr.querySelector('.bulk-status').value,
      comments: [],
      createdAt: new Date().toISOString()
    });
  });

  if (hasError) { showNotif('Missing titles', 'Please fill in all task titles (highlighted in red).', 'warning'); return; }
  if (toAdd.length === 0) { showNotif('No tasks', 'Add at least one row.', 'warning'); return; }

  toAdd.forEach(t => {
    state.tasks.push(t);
    if (t.assignee) {
      const m = getMember(t.assignee);
      if (m) logActivity(`Assigned <strong>${esc(t.title)}</strong> to <strong>${esc(m.name)}</strong>`, '👤');
    }
  });

  logActivity(`Bulk added <strong>${toAdd.length} task${toAdd.length!==1?'s':''}</strong>`, '✦');
  save();
  closeBulkModal();
  renderBoard();
  showNotif('Tasks created!', `${toAdd.length} task${toAdd.length!==1?'s were':' was'} added to the board.`, 'success');
}

document.getElementById('bulkOverlay').addEventListener('click', function(e) { if(e.target === this) closeBulkModal(); });

// ── INIT ─────────────────────────────────────────────────────
renderBoard();
</script>
